<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title displayed in browser tab and when link is shared -->
    <title>JSON Formatter - My First Tool</title>

    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <!-- Main page heading -->
      <h1>JSON Formatter</h1>

      <!-- Input textarea for user to paste JSON -->
      <textarea
        id="json-input"
        placeholder="Paste your JSON here..."
      ></textarea>

      <!-- Button to trigger JSON formatting -->
      <button id="format-btn">Format JSON</button>

      <!-- Output area to display formatted JSON -->
      <pre id="output"></pre>
    </main>

    <!-- Link to external JavaScript file with formatter logic -->
    <script src="js/script.js"></script>
  </body>
</html>
